<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>David Mejia | Artwork</title>
    <meta name="description" content="Artwork by David Mejia.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f9fafb;
            --text-color: #111827;
            --accent-color: #171717;
            --accent-hover: #404040;
            --card-bg: #ffffff;
            --border-color: #e5e7eb;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        /* Navigation */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
        }

        .nav-content {
            max-width: 800px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-weight: 600;
            font-size: 1.25rem;
            text-decoration: none;
            color: var(--text-color);
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 1.5rem;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: #4b5563;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: var(--accent-color);
        }

        .nav-links a.active {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 0.25rem;
        }

        /* Main Content */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 2rem;
            padding-top: 8rem; /* space for navbar */
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: #4b5563;
            text-decoration: none;
            font-weight: 500;
            margin-bottom: 2rem;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--accent-color);
        }

        .back-link svg {
            margin-right: 0.5rem;
        }

        .artwork-header {
            margin-bottom: 3rem;
            text-align: center;
        }

        .artwork-title {
            font-size: 2.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #000;
        }

        .artwork-subtitle {
             font-size: 1.125rem;
             color: #4b5563;
             font-weight: 300;
             max-width: 600px;
             margin: 0 auto;
        }

        .artwork-container {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 4rem;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        .artwork-image {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            display: block;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 2rem;
            color: #9ca3af;
            border-top: 1px solid var(--border-color);
            margin-top: 4rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-content">
            <a href="index.html" class="logo">DM</a>
            <ul class="nav-links">
                <li><a href="index.html#home">Home</a></li>
                <li><a href="work.html" class="active">Work</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <a href="index.html" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Home
        </a>

        <header class="artwork-header">
            <h1 class="artwork-title">My Work</h1>
            <p class="artwork-subtitle">A collection of my recent creative projects and designs.</p>
        </header>

        <div class="artwork-container">
            <img src="images/LargeFormatPrintFinal.png" alt="Large Format Print Final" class="artwork-image">
        </div>
    </main>

    <footer>
        <p>&copy; 2026 David Mejia. All rights reserved.</p>
    </footer>
</body>
</html>
